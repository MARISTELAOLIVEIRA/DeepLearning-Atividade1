<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Deep Learning Quiz</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
width:650px;
margin:auto;
margin-top:60px;
background:#0f172a;
padding:30px;
border-radius:10px;
box-shadow:0 0 20px #22c55e;
}

button{
padding:10px;
margin:8px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
}

.answer{
display:block;
width:100%;
background:#1e293b;
}

.progress{
width:100%;
height:10px;
background:#1e293b;
margin:20px 0;
}

.progress-bar{
height:100%;
background:#22c55e;
width:0%;
}

.hidden{
display:none;
}

.correct{background:#15803d !important}
.wrong{background:#b91c1c !important}

</style>

</head>

<body>
    <h1>Deep Learning Quiz</h1>

<canvas id="bg"></canvas>

<div class="container">

<div id="start">

<h1>Bem vindo!</h1>

<input id="name" placeholder="Digite seu nome">

<br>

<button onclick="startQuiz()">Iniciar</button>

</div>

<div id="quiz" class="hidden">

<h2 id="question"></h2>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div id="answers"></div>

<p id="feedback"></p>

<button id="next" class="hidden" onclick="nextQuestion()">Próxima</button>

</div>

<div id="result" class="hidden">

<h2 id="score"></h2>

<p>📸 Tire um print e envie para a professora.</p>

<h3>Ranking</h3>

<div id="ranking"></div>

</div>

</div>

<script>

/* animação rede neural */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let nodes=[]

for(let i=0;i<40;i++){

nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

nodes.forEach(n=>{

n.x+=n.vx
n.y+=n.vy

if(n.x<0||n.x>canvas.width)n.vx*=-1
if(n.y<0||n.y>canvas.height)n.vy*=-1

ctx.beginPath()
ctx.arc(n.x,n.y,3,0,Math.PI*2)
ctx.fillStyle="#22c55e"
ctx.fill()

nodes.forEach(n2=>{

let d=Math.hypot(n.x-n2.x,n.y-n2.y)

if(d<120){

ctx.beginPath()
ctx.moveTo(n.x,n.y)
ctx.lineTo(n2.x,n2.y)
ctx.strokeStyle="rgba(34,197,94,0.2)"
ctx.stroke()

}

})

})

requestAnimationFrame(animate)

}

animate()

/* quiz */

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5)
}

const questions=[

{q:"Deep Learning pertence a:",a:["Machine Learning","Banco de dados","Hardware","Redes"],c:0},

{q:"Redes neurais são inspiradas em:",a:["Cérebro humano","Internet","GPU","Servidor"],c:0},

{q:"Qual biblioteca é usada em Deep Learning?",a:["TensorFlow","Excel","Word","Photoshop"],c:0},

{q:"O que a rede neural aprende?",a:["Pesos","Internet","Memória","Sistema"],c:0},

{q:"Qual função de ativação é comum?",a:["ReLU","SQL","HTTP","DNS"],c:0},

{q:"Dataset significa:",a:["Conjunto de dados","Código","Servidor","GPU"],c:0},

{q:"Treinar modelo significa:",a:["Ajustar pesos","Criar site","Rodar HTML","Instalar GPU"],c:0},

{q:"CNN é usada para:",a:["Imagens","Planilhas","Firewall","Rede"],c:0},

{q:"RNN é usada para:",a:["Sequências","Imagem","Hardware","GPU"],c:0},

{q:"Overfitting significa:",a:["Modelo decorou dados","Modelo rápido","Modelo lento","Modelo simples"],c:0},

{q:"GPU ajuda porque:",a:["Processamento paralelo","Armazenar dados","Criar dataset","Executar HTML"],c:0},

{q:"Loss function mede:",a:["Erro","Memória","Rede","Velocidade"],c:0},

{q:"Softmax é usada para:",a:["Classificação","Memória","Servidor","Rede"],c:0},

{q:"Epoch significa:",a:["Passagem pelo dataset","Erro","Camada","Função"],c:0},

{q:"Camadas profundas permitem:",a:["Padrões complexos","Criar banco","Executar HTML","RAM"],c:0},

{q:"Entrada da rede neural:",a:["Dados","GPU","Servidor","Kernel"],c:0},

{q:"Saída da rede neural:",a:["Predição","Código","Memória","Dataset"],c:0},

{q:"Deep Learning usa:",a:["Redes neurais profundas","Planilhas","Firewall","Drivers"],c:0},

{q:"MNIST contém:",a:["Números escritos","Texto","Áudio","Vídeo"],c:0},

{q:"Accuracy mede:",a:["Taxa de acerto","Velocidade","Memória","Rede"],c:0}

]

let quiz=shuffle(questions)

let current=0
let score=0
let player=""

function startQuiz(){

player=document.getElementById("name").value

if(player===""){alert("Digite seu nome");return}

document.getElementById("start").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

showQuestion()

}

function showQuestion(){

let q=quiz[current]

document.getElementById("question").innerText="Pergunta "+(current+1)+": "+q.q

let answers=document.getElementById("answers")

answers.innerHTML=""

let shuffled=shuffle(q.a)

shuffled.forEach(ans=>{

let btn=document.createElement("button")

btn.className="answer"

btn.innerText=ans

btn.onclick=()=>checkAnswer(btn,ans,q)

answers.appendChild(btn)

})

document.getElementById("progress").style.width=(current/quiz.length)*100+"%"

}

function checkAnswer(btn,ans,q){

let correct=q.a[q.c]

if(ans===correct){

score++
btn.classList.add("correct")

document.getElementById("feedback").innerText="✔ Correto"

}

else{

btn.classList.add("wrong")

document.getElementById("feedback").innerText="✖ Errado: "+correct

}

document.getElementById("next").classList.remove("hidden")

}

function nextQuestion(){

document.getElementById("feedback").innerText=""
document.getElementById("next").classList.add("hidden")

current++

if(current<quiz.length){

showQuestion()

}else{

finishQuiz()

}

}

function finishQuiz(){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

document.getElementById("score").innerText=player+" — "+score+"/20"

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

ranking.push({name:player,score:score})

ranking.sort((a,b)=>b.score-a.score)

localStorage.setItem("ranking",JSON.stringify(ranking))

let html=""

ranking.slice(0,10).forEach(r=>{

html+=r.name+" — "+r.score+"<br>"

})

document.getElementById("ranking").innerHTML=html

}

</script>

</body>
</html>
